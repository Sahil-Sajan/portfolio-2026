    <script>
      (function() {
        // Configuration
        const STANDARD_WIDTH = 1920; // The width your design was built for

        function applyScale() {
          const width = window.innerWidth;
          const root = document.documentElement; // Apply to <html> tag, safer than #root

          if (width > STANDARD_WIDTH) {
            const scale = width / STANDARD_WIDTH;
            // Apply CSS variable for use in styling
            root.style.setProperty('--app-scale', scale);
            // Apply the actual browser zoom
            root.style.zoom = scale;
          } else {
            root.style.setProperty('--app-scale', 1);
            root.style.zoom = 1;
          }
        }

        // Run immediately (before DOM is fully parsed)
        applyScale();

        // Run on resize
        window.addEventListener('resize', applyScale);
      })();
    </script>
